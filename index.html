<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>خمّن ما عندي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.wrap{width:100%;max-width:480px}
.scr{display:flex;flex-direction:column;gap:.875rem}
.hdr{text-align:center;padding:1.125rem;background:#fff;border-radius:16px;border:.5px solid #e0dfd8}
.hdr h1{font-size:21px;font-weight:700}
.hdr p{font-size:13px;color:#6b6b66;margin-top:3px}
.card{background:#fff;border:.5px solid #e0dfd8;border-radius:16px;padding:1.125rem}
.btn{padding:.6rem 1rem;border:.5px solid #c8c7c0;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:500;cursor:pointer;background:#fff;color:#1a1a18;transition:background .15s;width:100%}
.btn:hover{background:#f5f4f0}
.btn:disabled{opacity:.45;cursor:default}
.bp{background:#378ADD;color:#fff;border-color:#185FA5}.bp:hover:not(:disabled){background:#185FA5}
.bg{background:#1D9E75;color:#fff;border-color:#0F6E56}.bg:hover:not(:disabled){background:#0F6E56}
.br{background:#E24B4A;color:#fff;border-color:#A32D2D}.br:hover:not(:disabled){background:#A32D2D}
.ifield{width:100%;padding:.6rem .9rem;border:.5px solid #c8c7c0;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;background:#fff;color:#1a1a18;text-align:right;outline:none}
.ifield:focus{border-color:#378ADD}
.irow{display:flex;gap:.5rem}
.irow .ifield{flex:1}
.irow .btn{width:auto;white-space:nowrap}
.sb{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:#fff;border:.5px solid #e0dfd8;border-radius:16px;padding:.875rem 1.125rem}
.sb-name{font-size:12px;color:#6b6b66;font-weight:500;margin-bottom:2px;text-align:center}
.sb-score{font-size:36px;font-weight:700;line-height:1;text-align:center}
.sb-me .sb-score{color:#185FA5}
.sb-op .sb-score{color:#0F6E56}
.sb-mid{text-align:center;font-size:13px;color:#bbb}
.sb-lbl{font-size:11px;color:#bbb;margin-top:3px}
.code-box{background:#1a1a18;color:#fff;border-radius:14px;padding:1.5rem;text-align:center}
.code-num{font-size:48px;font-weight:700;letter-spacing:8px;margin:.5rem 0}
.code-hint{font-size:13px;color:#aaa}
.itembx{background:linear-gradient(135deg,#E6F1FB,#E1F5EE);border:.5px solid #B5D4F4;border-radius:14px;padding:1.375rem;text-align:center}
.iem{font-size:52px;line-height:1.2}
.inm{font-size:18px;font-weight:700;margin-top:5px}
.iht{font-size:13px;color:#6b6b66;margin-top:2px}
/* item mini badge shown during game */
.item-mini{display:flex;align-items:center;gap:.5rem;background:#E6F1FB;border:.5px solid #B5D4F4;border-radius:10px;padding:.5rem .875rem;font-size:14px;font-weight:500;color:#0C447C}
.item-mini-e{font-size:22px;line-height:1}
.prg{background:#e8e7e0;border-radius:99px;height:6px;overflow:hidden}
.prf{height:100%;border-radius:99px;background:#378ADD;transition:width .35s}
.qbox{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:.5rem;padding:.25rem 0;scrollbar-width:thin}
.mq-me{background:#E6F1FB;color:#0C447C;padding:.6rem .9rem;border-radius:10px;border-bottom-right-radius:3px;font-size:14px;align-self:flex-end;max-width:82%;line-height:1.5}
.mq-op{background:#E1F5EE;color:#085041;padding:.6rem .9rem;border-radius:10px;border-bottom-left-radius:3px;font-size:14px;align-self:flex-start;max-width:82%;line-height:1.5}
.ma{background:#f5f4f0;padding:.6rem .9rem;border-radius:10px;font-size:14px;align-self:center;max-width:88%;line-height:1.5;text-align:center}
.ms{background:#FAEEDA;color:#633806;padding:3px 14px;border-radius:99px;font-size:12px;align-self:center}
.tind{display:flex;align-items:center;gap:.5rem;padding:.65rem .9rem;border-radius:10px;border:.5px solid #c8c7c0;font-size:14px;font-weight:500}
.tip1{background:#E6F1FB;border-color:#B5D4F4;color:#0C447C}
.tip2{background:#E1F5EE;border-color:#9FE1CB;color:#085041}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#378ADD}
.dot2{background:#1D9E75}
.abtns{display:flex;flex-wrap:wrap;gap:.4rem}
.abtn{padding:.35rem .85rem;border:.5px solid #c8c7c0;border-radius:99px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;background:#f5f4f0;color:#1a1a18}
.abtn:hover{background:#fff}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.cbtn{padding:.875rem .75rem;border:1.5px solid #e0dfd8;border-radius:14px;cursor:pointer;text-align:center;background:#fff;transition:all .2s;font-family:'Tajawal',sans-serif}
.cbtn:hover:not(:disabled){border-color:#378ADD;background:#E6F1FB}
.cbtn:disabled{opacity:.6;cursor:default}
.cem{font-size:30px;display:block;line-height:1.3}
.cnm{font-size:13px;font-weight:500}
.waiting{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.875rem;font-size:14px;color:#6b6b66}
.spin{width:16px;height:16px;border:2px solid #ddd;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.tag{display:inline-block;padding:2px 9px;border-radius:8px;font-size:12px;font-weight:500}
.tag-me{background:#E6F1FB;color:#0C447C}
.tag-op{background:#E1F5EE;color:#085041}
.pt-badge{display:inline-block;padding:3px 12px;border-radius:99px;font-size:13px;font-weight:500;margin-top:.5rem}
.pt-ok{background:#E1F5EE;color:#085041}
.pt-no{background:#f5f4f0;color:#888}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.rcrd{text-align:center;padding:1rem;border-radius:14px;border:.5px solid #e0dfd8;background:#f5f4f0}
/* input area wrapper — never re-rendered by patch updates */
#inp-area{display:flex;flex-direction:column;gap:.625rem}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const SB='https://irycvanmqiggnkppbbrx.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyeWN2YW5tcWlnZ25rcHBiYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTk0MTgsImV4cCI6MjA4NzI3NTQxOH0.S3lU3rCb1J9o-b4WjfGoavZW0-ki_wQD-jiMdC7cXGE';
const H={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY};

const IT=[
  {n:"قهوة",e:"☕",s:"سائل"},{n:"هاتف ذكي",e:"📱",s:"صلب"},{n:"كتاب",e:"📚",s:"صلب"},
  {n:"ماء",e:"💧",s:"سائل"},{n:"مفتاح",e:"🔑",s:"صلب"},{n:"هواء",e:"💨",s:"غاز"},
  {n:"سيارة",e:"🚗",s:"صلب"},{n:"تفاحة",e:"🍎",s:"صلب"},{n:"حاسوب",e:"💻",s:"صلب"},
  {n:"بخار ماء",e:"🌫️",s:"غاز"},{n:"قلم",e:"🖊️",s:"صلب"},{n:"عصير",e:"🍹",s:"سائل"},
  {n:"نظارة",e:"👓",s:"صلب"},{n:"ثلج",e:"🧊",s:"صلب"},{n:"زجاجة",e:"🫙",s:"صلب"},
  {n:"كرسي",e:"🪑",s:"صلب"},{n:"ساعة",e:"⌚",s:"صلب"},{n:"خبز",e:"🍞",s:"صلب"},
  {n:"دراجة",e:"🚲",s:"صلب"},{n:"شمعة",e:"🕯️",s:"صلب"},{n:"حليب",e:"🥛",s:"سائل"},
  {n:"كرة قدم",e:"⚽",s:"صلب"},{n:"مكنسة",e:"🧹",s:"صلب"},{n:"أكسجين",e:"🫧",s:"غاز"},
  {n:"سكين",e:"🔪",s:"صلب"},{n:"وسادة",e:"🛏️",s:"صلب"},{n:"دفتر",e:"📒",s:"صلب"},
  {n:"بطارية",e:"🔋",s:"صلب"},{n:"مظلة",e:"☂️",s:"صلب"},{n:"حقيبة",e:"👜",s:"صلب"},
  {n:"صابون",e:"🧼",s:"صلب"},{n:"مصباح",e:"💡",s:"صلب"},{n:"سماعة",e:"🎧",s:"صلب"},
  {n:"شاي",e:"🍵",s:"سائل"},{n:"مرآة",e:"🪞",s:"صلب"},{n:"غاز الطبخ",e:"🔥",s:"غاز"},
  {n:"شاحن",e:"🔌",s:"صلب"},{n:"تلفاز",e:"📺",s:"صلب"},{n:"مقص",e:"✂️",s:"صلب"},
  {n:"عطر",e:"🌺",s:"سائل"},{n:"مروحة",e:"🌀",s:"صلب"},{n:"موز",e:"🍌",s:"صلب"},
  {n:"مطرقة",e:"🔨",s:"صلب"},{n:"ميزان",e:"⚖️",s:"صلب"},{n:"معجون",e:"🪥",s:"صلب"},
  {n:"طاولة",e:"🪵",s:"صلب"},{n:"شطرنج",e:"♟️",s:"صلب"},
];
function pick(ex){let p,t=0;do{p=IT[Math.floor(Math.random()*IT.length)];t++;}while(ex&&p.n===ex.n&&t<80);return p;}
function shuf(a){return[...a].sort(()=>Math.random()-.5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rndCode(){return String(Math.floor(1000+Math.random()*9000));}

/* ── state ── */
let G={
  ph:'lobby', myName:'', opName:'', myRole:0, roomCode:'',
  myItem:null, opItem:null, myScore:0, opScore:0, round:0,
  msgs:[], qCount:0, MAX:10, asker:1, pendingQ:null,
  myChoices:[], myGuess:null, opGuess:null, opGuessed:false,
  pollTimer:null, saving:false,
  /* snapshot of last known db state to detect real changes */
  _lastMsgLen:-1, _lastQ:-1, _lastAsker:-1, _lastStatus:'', _lastOpGuessed:false,
};

/* ── DB ── */
async function dbGet(f){
  try{const r=await fetch(`${SB}/rest/v1/game_rooms?${f}`,{headers:H});const d=await r.json();return Array.isArray(d)&&d.length?d[0]:null;}catch{return null;}
}
async function dbUpsert(data){
  try{await fetch(`${SB}/rest/v1/game_rooms`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(data)});}catch{}
}
async function dbPatch(f,data){
  try{await fetch(`${SB}/rest/v1/game_rooms?${f}`,{method:'PATCH',headers:H,body:JSON.stringify(data)});}catch{}
}
async function fetchRoom(){return dbGet('code=eq.'+G.roomCode+'&select=*');}

/* ── apply row to state ── */
function applyRow(row){
  if(!row)return false;
  let changed=false;
  const newStatus=row.status||'';
  const newMsgs=row.msgs?JSON.parse(row.msgs):[];
  const newQ=row.q_count||0;
  const newAsker=row.asker||1;
  const opField=G.myRole===1?'p2_guess':'p1_guess';
  const newOpGuessed=!!(row[opField]&&row[opField]!=='{}');

  if(G.myRole===1){
    G.opName=row.p2_name||G.opName;
    if(row.p2_item&&row.p2_item!=='') G.opItem=JSON.parse(row.p2_item);
    G.myScore=row.score1||0; G.opScore=row.score2||0;
  } else {
    G.opName=row.p1_name||G.opName;
    if(row.p1_item&&row.p1_item!=='') G.opItem=JSON.parse(row.p1_item);
    G.myScore=row.score2||0; G.opScore=row.score1||0;
  }
  G.round=row.round||0;

  if(newStatus!==G._lastStatus){G._lastStatus=newStatus;changed=true;}
  if(newMsgs.length!==G._lastMsgLen){G._lastMsgLen=newMsgs.length;G.msgs=newMsgs;changed=true;}
  if(newQ!==G._lastQ){G._lastQ=newQ;G.qCount=newQ;changed=true;}
  if(newAsker!==G._lastAsker){G._lastAsker=newAsker;G.asker=newAsker;changed=true;}
  if(newOpGuessed!==G._lastOpGuessed){G._lastOpGuessed=newOpGuessed;G.opGuessed=newOpGuessed;changed=true;}

  /* pending question */
  const pq=row.pending_q||'';
  if(pq!==G.pendingQ){G.pendingQ=pq||null;changed=true;}

  /* scores change */
  if(row.score1!==undefined){
    const ms=G.myRole===1?row.score1:row.score2;
    const os=G.myRole===1?row.score2:row.score1;
    if(ms!==G.myScore||os!==G.opScore){G.myScore=ms;G.opScore=os;changed=true;}
  }

  return {changed, status:newStatus};
}

/* ── polling — smart: only re-render when data actually changed ── */
function startPoll(){
  stopPoll();
  G.pollTimer=setInterval(async()=>{
    const row=await fetchRoom();
    if(!row)return;
    const {changed,status}=applyRow(row);

    /* phase transitions always re-render */
    if(status==='ready'&&(G.ph==='waiting')){
      G.ph='items'; fullRender(); return;
    }
    if(status==='game'&&G.ph==='items'){
      G.ph='game'; fullRender(); return;
    }
    if(status==='guessing'&&G.ph==='game'){
      buildMyChoices(); G.ph='guessing'; fullRender(); return;
    }
    if(status==='roundEnd'&&G.ph==='guessing'){
      /* fetch op guess */
      const opField=G.myRole===1?'p2_guess':'p1_guess';
      if(row[opField]&&row[opField]!=='{}') G.opGuess=JSON.parse(row[opField]);
      G.ph='roundEnd'; fullRender(); return;
    }
    if(status==='game'&&G.ph==='roundEnd'){
      const myF=G.myRole===1?'p1_item':'p2_item';
      G.myItem=JSON.parse(row[myF]);
      G.myGuess=null; G.opGuess=null; G.opGuessed=false;
      G.msgs=[]; G.qCount=0; G.asker=1; G.pendingQ=null;
      G._lastMsgLen=0; G._lastQ=0; G._lastAsker=1;
      G.ph='items'; fullRender(); return;
    }

    if(!changed) return; /* nothing new — don't touch DOM */

    /* smart partial updates for game screen */
    if(G.ph==='game'){
      patchGameScreen(); return;
    }
    if(G.ph==='guessing'&&G.opGuessed){
      fullRender(); return;
    }
    if(changed){ fullRender(); }
  },1800);
}
function stopPoll(){if(G.pollTimer){clearInterval(G.pollTimer);G.pollTimer=null;}}

/* ── smart game screen patch: update only msgs + input area, preserve typed text ── */
function patchGameScreen(){
  const msgBox=document.getElementById('mb');
  if(msgBox){
    msgBox.innerHTML=renderMsgs();
    msgBox.scrollTop=msgBox.scrollHeight;
  }
  /* update scoreboard numbers without re-rendering it */
  const sb=document.getElementById('sb-me-score');
  const sb2=document.getElementById('sb-op-score');
  if(sb) sb.textContent=G.myScore;
  if(sb2) sb2.textContent=G.opScore;

  /* update input area only if turn/pending changed */
  const inpArea=document.getElementById('inp-area');
  if(inpArea){
    const newInp=renderInputArea();
    if(newInp!==inpArea.getAttribute('data-last')){
      /* save typed text before overwriting */
      const qEl=document.getElementById('qi');
      const aEl=document.getElementById('ai');
      const qVal=qEl?qEl.value:'';
      const aVal=aEl?aEl.value:'';
      inpArea.innerHTML=newInp;
      inpArea.setAttribute('data-last',newInp);
      /* restore typed text */
      const nqEl=document.getElementById('qi');
      const naEl=document.getElementById('ai');
      if(nqEl&&qVal) nqEl.value=qVal;
      if(naEl&&aVal) naEl.value=aVal;
      bindInputArea();
    }
  }
}

function buildMyChoices(){
  const cor=G.opItem;
  if(!cor)return;
  const opts=[cor];
  while(opts.length<5){const r=pick(null);if(!opts.find(o=>o.n===r.n))opts.push(r);}
  G.myChoices=shuf(opts);
}

/* ── render ── */
function fullRender(){
  document.getElementById('app').innerHTML=buildHTML();
  bindAll();
}
/* alias */
const render=fullRender;

function sbHTML(){
  return`<div class="sb">
    <div class="sb-me"><div class="sb-name">${esc(G.myName)} <span class="tag tag-me">أنا</span></div><div class="sb-score" id="sb-me-score">${G.myScore}</div></div>
    <div class="sb-mid"><div>VS</div><div class="sb-lbl">جولة ${G.round+1}</div></div>
    <div class="sb-op"><div class="sb-name">${esc(G.opName||'...')}</div><div class="sb-score" id="sb-op-score">${G.opScore}</div></div>
  </div>`;}

function renderMsgs(){
  return G.msgs.map(m=>{
    if(m.t==='q'){
      const mine=(G.myRole===1&&m.p===1)||(G.myRole===2&&m.p===2);
      return`<div class="${mine?'mq-me':'mq-op'}"><span style="font-size:11px;opacity:.75;display:block;margin-bottom:2px">${mine?'أنا أسأل':esc(G.opName)+' يسأل'}:</span>${esc(m.v)}</div>`;
    }
    if(m.t==='a') return`<div class="ma"><strong>الجواب:</strong> ${esc(m.v)}</div>`;
    return`<div class="ms">${esc(m.v)}</div>`;
  }).join('')||'<div class="ms">ابدأ بطرح أسئلتك!</div>';
}

function renderInputArea(){
  const myTurn=G.asker===G.myRole;
  const waitingAns=!!G.pendingQ;
  const iAnswer=waitingAns&&!myTurn;

  if(G.qCount>=G.MAX){
    return`<div class="waiting"><div class="spin"></div>انتهت الأسئلة — جاري الانتقال للتخمين...</div>`;
  }
  if(iAnswer){
    return`<div class="tind tip2"><div class="dot dot2"></div>دورك للإجابة على سؤال ${esc(G.opName)}</div>
    <div class="card" style="background:#f5f4f0;padding:.75rem"><p style="font-size:14px;font-weight:500">السؤال: ${esc(G.pendingQ)}</p></div>
    <div class="abtns">${['نعم ✓','لا ✗','أحياناً','ربما','لا أعلم'].map(a=>`<button class="abtn" data-a="${a}">${a}</button>`).join('')}</div>
    <div class="irow"><input id="ai" class="ifield" placeholder="أو اكتب جوابك..."/><button class="btn bg" id="sa" style="width:auto;padding:.6rem 1rem">إرسال</button></div>`;
  }
  if(waitingAns&&myTurn){
    return`<div class="waiting"><div class="spin"></div>في انتظار إجابة ${esc(G.opName)}...</div>`;
  }
  if(myTurn){
    return`<div class="tind tip1"><div class="dot"></div>دورك تسأل — سؤال ${G.qCount+1} من ${G.MAX}</div>
    <div class="irow"><input id="qi" class="ifield" placeholder="مثال: هل هو صلب؟ هل يُستخدم يومياً؟"/><button class="btn bp" id="sq" style="width:auto;padding:.6rem 1rem">إرسال</button></div>`;
  }
  return`<div class="waiting"><div class="spin"></div>في انتظار سؤال ${esc(G.opName)}...</div>`;
}

function buildHTML(){
  const p=G.ph;
  if(p==='lobby') return lobbyH();
  if(p==='waiting') return waitingH();
  if(p==='items') return itemsH();
  if(p==='game') return gameH();
  if(p==='guessing') return guessingH();
  if(p==='roundEnd') return roundEndH();
  return lobbyH();
}

function lobbyH(){return`<div class="scr">
  <div class="hdr"><h1>🎯 خمّن ما عندي</h1><p>لعبة تحدي بين جهازين</p></div>
  <div class="card"><p style="font-size:13px;color:#6b6b66;margin-bottom:.75rem">أدخل اسمك</p>
    <input id="nameInp" class="ifield" placeholder="اسمك" value="${esc(G.myName)}"/></div>
  <div class="card"><p style="font-size:14px;font-weight:700;margin-bottom:.625rem">إنشاء غرفة جديدة</p>
    <p style="font-size:13px;color:#6b6b66;margin-bottom:.75rem">ستحصل على كود تشاركه مع صاحبك</p>
    <button class="btn bp" id="createBtn">إنشاء غرفة ▶</button></div>
  <div class="card"><p style="font-size:14px;font-weight:700;margin-bottom:.625rem">الانضمام لغرفة موجودة</p>
    <div class="irow">
      <input id="codeInp" class="ifield" placeholder="الكود" maxlength="4" style="text-align:center;font-size:22px;font-weight:700;letter-spacing:6px"/>
      <button class="btn bp" id="joinBtn" style="width:auto;padding:.6rem 1.1rem">انضم</button>
    </div></div>
</div>`;}

function waitingH(){return`<div class="scr">
  <div class="hdr"><h1>🎯 خمّن ما عندي</h1></div>
  <div class="code-box"><p class="code-hint">شارك هذا الكود مع صاحبك</p>
    <div class="code-num">${G.roomCode}</div>
    <p class="code-hint">في انتظار الانضمام...</p></div>
  <div class="waiting"><div class="spin"></div>ينتظر اللاعب الثاني...</div>
  <button class="btn" id="copyBtn">نسخ الكود 📋</button>
</div>`;}

function itemsH(){
  const it=G.myItem;
  if(!it)return`<div class="scr"><div class="waiting"><div class="spin"></div>جاري التحضير...</div></div>`;
  return`<div class="scr">
  ${sbHTML()}
  <div class="hdr"><h1>🔒 عنصرك السري</h1><p>هذا لك وحدك طوال اللعبة!</p></div>
  <div class="card" style="text-align:center">
    <div class="itembx"><div class="iem">${it.e}</div><div class="inm">${esc(it.n)}</div><div class="iht">الحالة: <strong>${esc(it.s)}</strong></div></div>
    <div style="background:#FAEEDA;border-radius:10px;padding:.75rem;margin-top:.875rem;font-size:13px;color:#633806">⚠️ احفظ عنصرك — لن يظهر مرة أخرى خلال اللعب</div>
    <button class="btn bp" id="readyBtn" style="margin-top:.875rem;padding:.75rem">حفظت — جاهز ✓</button>
  </div></div>`;}

function gameH(){
  const it=G.myItem;
  return`<div class="scr">
  ${sbHTML()}
  ${it?`<div class="item-mini"><span class="item-mini-e">${it.e}</span><span>عنصرك: <strong>${esc(it.n)}</strong> (${esc(it.s)})</span></div>`:''}
  <div class="hdr"><h1>❓ الأسئلة</h1><p>${G.qCount} من ${G.MAX}</p></div>
  <div class="prg"><div class="prf" style="width:${Math.round(G.qCount/G.MAX*100)}%"></div></div>
  <div class="card qbox" id="mb">${renderMsgs()}</div>
  <div id="inp-area" data-last="">${renderInputArea()}</div>
</div>`;}

function guessingH(){
  const it=G.myItem;
  if(G.myGuess){
    if(G.opGuessed){
      return`<div class="scr">${sbHTML()}<div class="waiting"><div class="spin"></div>كلاكما خمّن — جاري الحساب...</div></div>`;
    }
    return`<div class="scr">${sbHTML()}
    ${it?`<div class="item-mini"><span class="item-mini-e">${it.e}</span><span>عنصرك: <strong>${esc(it.n)}</strong></span></div>`:''}
    <div class="card" style="text-align:center;padding:1.25rem">
      <p style="font-size:15px;font-weight:500;margin-bottom:.5rem">اخترت: ${G.myGuess.e} ${esc(G.myGuess.n)}</p>
      <div class="waiting"><div class="spin"></div>في انتظار تخمين ${esc(G.opName)}...</div>
    </div></div>`;}
  return`<div class="scr">
  ${sbHTML()}
  ${it?`<div class="item-mini"><span class="item-mini-e">${it.e}</span><span>عنصرك: <strong>${esc(it.n)}</strong></span></div>`:''}
  <div class="hdr"><h1>🎯 وقت التخمين</h1><p>خمّن ما عند ${esc(G.opName)}</p></div>
  <p style="font-size:13px;color:#6b6b66;text-align:center">اختر من الخيارات الخمسة</p>
  <div class="cgrid">${G.myChoices.map((c,i)=>`<button class="cbtn" data-i="${i}"><span class="cem">${c.e}</span><span class="cnm">${esc(c.n)}</span></button>`).join('')}</div>
</div>`;}

function roundEndH(){
  const myOk=G.myGuess&&G.opItem&&G.myGuess.n===G.opItem.n;
  const opOk=G.opGuess&&G.myItem&&G.opGuess.n===G.myItem.n;
  let msg=myOk&&opOk?'تعادل! كلاكما خمّن صحيح 🤝':myOk?'أنت تفوز بالجولة 🎉':opOk?esc(G.opName)+' يفوز بالجولة 🎉':'لم يخمن أحد 😅';
  const lead=G.myScore>G.opScore?'أنت تتصدر 🏆':G.opScore>G.myScore?esc(G.opName)+' يتصدر 🏆':'تعادل في المجموع';
  return`<div class="scr">
  <div class="sb">
    <div class="sb-me"><div class="sb-name">${esc(G.myName)}</div><div class="sb-score">${G.myScore}</div></div>
    <div class="sb-mid"><div>VS</div><div class="sb-lbl" style="color:#1D9E75">${lead}</div></div>
    <div class="sb-op"><div class="sb-name">${esc(G.opName)}</div><div class="sb-score">${G.opScore}</div></div>
  </div>
  <div class="card"><p style="font-size:16px;font-weight:700;text-align:center;margin-bottom:.875rem">${msg}</p>
    <div class="rgrid">
      <div class="rcrd" style="border:${myOk?'2px solid #1D9E75':''}">
        <span class="tag tag-me">أنا</span><p style="font-size:26px;margin:.4rem 0">${myOk?'✅':'❌'}</p>
        <p style="font-size:12px;color:#6b6b66">خمّنت: ${G.myGuess?G.myGuess.e+' '+esc(G.myGuess.n):'—'}</p>
        <p style="font-size:12px;color:#6b6b66">الصح: ${G.opItem?G.opItem.e+' '+esc(G.opItem.n):'—'}</p>
        <span class="pt-badge ${myOk?'pt-ok':'pt-no'}">${myOk?'+1 نقطة':'0'}</span>
      </div>
      <div class="rcrd" style="border:${opOk?'2px solid #1D9E75':''}">
        <span class="tag tag-op">${esc(G.opName)}</span><p style="font-size:26px;margin:.4rem 0">${opOk?'✅':'❌'}</p>
        <p style="font-size:12px;color:#6b6b66">خمّن: ${G.opGuess?G.opGuess.e+' '+esc(G.opGuess.n):'—'}</p>
        <p style="font-size:12px;color:#6b6b66">الصح: ${G.myItem?G.myItem.e+' '+esc(G.myItem.n):'—'}</p>
        <span class="pt-badge ${opOk?'pt-ok':'pt-no'}">${opOk?'+1 نقطة':'0'}</span>
      </div>
    </div>
  </div>
  ${G.myRole===1
    ?`<button class="btn bp" id="newRoundBtn" style="padding:.75rem">جولة جديدة ▶</button>`
    :`<div class="waiting"><div class="spin"></div>في انتظار اللاعب الأول لبدء جولة جديدة...</div>`}
  <button class="btn" id="leaveBtn">مغادرة</button>
</div>`;}

/* ── bind input area only (called after partial update) ── */
function bindInputArea(){
  const $=id=>document.getElementById(id);
  const scrollM=()=>{const b=$('mb');if(b)b.scrollTop=b.scrollHeight;};

  const doQ=async()=>{
    const el=$('qi');if(!el)return;
    const v=el.value.trim();if(!v)return;
    el.value=''; /* clear immediately */
    const nm=[...G.msgs,{t:'q',p:G.myRole,v}];
    G.msgs=nm; G.pendingQ=v; G._lastMsgLen=nm.length;
    patchGameScreen();scrollM();
    await dbPatch('code=eq.'+G.roomCode,{msgs:JSON.stringify(nm),pending_q:v,updated_at:new Date().toISOString()});
  };
  $('qi')&&$('qi').addEventListener('keydown',e=>{if(e.key==='Enter')doQ();});
  $('sq')&&$('sq').addEventListener('click',doQ);

  const doA=async(v)=>{
    if(!v)return;
    const nq=G.qCount+1;
    const na=G.myRole===1?2:1;
    const nm=[...G.msgs,{t:'a',v}];
    const sys=nq>=G.MAX?{t:'sys',v:'انتهت الأسئلة! حان وقت التخمين'}:{t:'sys',v:'الدور الآن لـ '+(na===G.myRole?'أنت':'صاحبك')};
    const fm=[...nm,sys];
    G.msgs=fm; G.qCount=nq; G.asker=na; G.pendingQ=null;
    G._lastMsgLen=fm.length; G._lastQ=nq; G._lastAsker=na;
    patchGameScreen();scrollM();
    const patch={msgs:JSON.stringify(fm),q_count:nq,asker:na,pending_q:'',updated_at:new Date().toISOString()};
    if(nq>=G.MAX) patch.status='guessing';
    await dbPatch('code=eq.'+G.roomCode,patch);
    if(nq>=G.MAX){buildMyChoices();G.ph='guessing';fullRender();}
  };
  $('ai')&&$('ai').addEventListener('keydown',e=>{if(e.key==='Enter'){const el=$('ai');if(el)doA(el.value.trim());}});
  $('sa')&&$('sa').addEventListener('click',()=>{const el=$('ai');if(el)doA(el.value.trim());});
  document.querySelectorAll('.abtn').forEach(b=>b.addEventListener('click',()=>doA(b.dataset.a)));
}

/* ── bind all ── */
function bindAll(){
  const $=id=>document.getElementById(id);

  /* lobby */
  if(G.ph==='lobby'){
    const getName=()=>{const e=$('nameInp');return e?e.value.trim():'';};
    $('createBtn')&&$('createBtn').addEventListener('click',async()=>{
      const name=getName();if(!name){alert('أدخل اسمك');return;}
      G.myName=name; $('createBtn').disabled=true; $('createBtn').textContent='جاري...';
      const code=rndCode(); G.roomCode=code; G.myRole=1;
      const item=pick(null); G.myItem=item;
      await dbUpsert({code,p1_name:name,p1_item:JSON.stringify(item),p2_name:'',p2_item:'',status:'waiting',score1:0,score2:0,round:0,msgs:'[]',q_count:0,asker:1,pending_q:'',p1_guess:'',p2_guess:'',updated_at:new Date().toISOString()});
      G.ph='waiting'; fullRender(); startPoll();
    });
    $('joinBtn')&&$('joinBtn').addEventListener('click',async()=>{
      const name=getName();if(!name){alert('أدخل اسمك');return;}
      const code=$('codeInp')?.value.trim();
      if(!code||code.length!==4){alert('أدخل كوداً من 4 أرقام');return;}
      $('joinBtn').disabled=true; $('joinBtn').textContent='...';
      const row=await dbGet('code=eq.'+code+'&select=*');
      if(!row||row.status!=='waiting'){alert('الكود غير صحيح أو الغرفة ممتلئة');$('joinBtn').disabled=false;$('joinBtn').textContent='انضم';return;}
      const item=pick(JSON.parse(row.p1_item||'null'));
      G.myName=name; G.myRole=2; G.roomCode=code; G.myItem=item;
      G.opName=row.p1_name;
      await dbPatch('code=eq.'+code,{p2_name:name,p2_item:JSON.stringify(item),status:'ready',updated_at:new Date().toISOString()});
      G.ph='items'; G._lastStatus='ready'; fullRender(); startPoll();
    });
    $('codeInp')&&$('codeInp').addEventListener('keydown',e=>{if(e.key==='Enter')$('joinBtn')?.click();});
  }

  /* waiting */
  if(G.ph==='waiting'){
    $('copyBtn')&&$('copyBtn').addEventListener('click',()=>{
      navigator.clipboard?.writeText(G.roomCode).then(()=>{if($('copyBtn')){$('copyBtn').textContent='تم النسخ ✓';setTimeout(()=>{if($('copyBtn'))$('copyBtn').textContent='نسخ الكود 📋';},2000);}});
    });
  }

  /* items */
  if(G.ph==='items'){
    $('readyBtn')&&$('readyBtn').addEventListener('click',async()=>{
      $('readyBtn').disabled=true; $('readyBtn').textContent='جاري...';
      if(G.myRole===1){
        await dbPatch('code=eq.'+G.roomCode,{status:'game',updated_at:new Date().toISOString()});
        G.ph='game'; G._lastStatus='game'; fullRender();
      } else {
        $('readyBtn').textContent='في انتظار اللاعب الأول...';
      }
    });
  }

  /* game input area */
  if(G.ph==='game') bindInputArea();

  /* guessing */
  if(G.ph==='guessing'&&!G.myGuess){
    document.querySelectorAll('.cbtn').forEach(b=>b.addEventListener('click',async()=>{
      const p=G.myChoices[parseInt(b.dataset.i)];
      G.myGuess=p; fullRender();
      const field=G.myRole===1?'p1_guess':'p2_guess';
      const patch={[field]:JSON.stringify(p),updated_at:new Date().toISOString()};
      const row=await fetchRoom();
      const opField=G.myRole===1?'p2_guess':'p1_guess';
      const opG=row?.[opField]&&row[opField]!==''&&row[opField]!=='{}'?JSON.parse(row[opField]):null;
      if(opG){
        G.opGuess=opG;
        const myOk=p.n===G.opItem?.n;
        const opOk=opG.n===G.myItem?.n;
        const s1=(row.score1||0)+(G.myRole===1&&myOk?1:G.myRole===2&&opOk?1:0);
        const s2=(row.score2||0)+(G.myRole===2&&myOk?1:G.myRole===1&&opOk?1:0);
        patch.score1=s1; patch.score2=s2;
        patch.round=(row.round||0)+1;
        patch.status='roundEnd';
        G.myScore=G.myRole===1?s1:s2;
        G.opScore=G.myRole===1?s2:s1;
        await dbPatch('code=eq.'+G.roomCode,patch);
        G.ph='roundEnd'; fullRender();
      } else {
        await dbPatch('code=eq.'+G.roomCode,patch);
      }
    }));
  }

  /* round end */
  if(G.ph==='roundEnd'){
    $('newRoundBtn')&&$('newRoundBtn').addEventListener('click',async()=>{
      $('newRoundBtn').disabled=true; $('newRoundBtn').textContent='جاري...';
      const i1=pick(null); const i2=pick(i1);
      await dbPatch('code=eq.'+G.roomCode,{
        p1_item:JSON.stringify(i1),p2_item:JSON.stringify(i2),
        p1_guess:'',p2_guess:'',msgs:'[]',q_count:0,asker:1,pending_q:'',status:'game',
        updated_at:new Date().toISOString()
      });
      G.myItem=G.myRole===1?i1:i2;
      G.myGuess=null; G.opGuess=null; G.opGuessed=false;
      G.msgs=[]; G.qCount=0; G.asker=1; G.pendingQ=null;
      G._lastMsgLen=0; G._lastQ=0; G._lastAsker=1; G._lastStatus='game';
      G.ph='items'; fullRender();
    });
    $('leaveBtn')&&$('leaveBtn').addEventListener('click',()=>{
      stopPoll();
      G={ph:'lobby',myName:G.myName,opName:'',myRole:0,roomCode:'',myItem:null,opItem:null,myScore:0,opScore:0,round:0,msgs:[],qCount:0,MAX:10,asker:1,pendingQ:null,myChoices:[],myGuess:null,opGuess:null,opGuessed:false,pollTimer:null,saving:false,_lastMsgLen:-1,_lastQ:-1,_lastAsker:-1,_lastStatus:'',_lastOpGuessed:false};
      fullRender();
    });
  }
}

fullRender();
</script>
</body>
